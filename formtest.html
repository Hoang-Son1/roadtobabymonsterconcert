<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HSC Syllabus Classifier</title>
    <style>
        body { foInt-family: sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; background: #f4f6f8; color: #333; }
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        button { background: #0070f3; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0051b3; }
        pre { background: #1e1e1e; color: #39ff14; padding: 15px; border-radius: 4px; overflow-x: auto; font-size: 13px; }
        .badge { background: #e0f0ff; color: #0070f3; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>HSC Stage 6 Syllabus Processing Engine</h2>
    <div class="card">
        <p><strong>Supported Formats:</strong> Images (.png, .jpg) or Full Trial Booklets (.pdf)</p>
        <form id="uploadForm">
            <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.pdf" required><br><br>
            <input type="text" id="hintInput" placeholder="Optional Focus Hint (e.g., 2024 Barker Trial)"><br><br>
            <button type="submit">Ingest & Map Syllabus Elements</button>
        </form>
    </div>

    <h3>Processing Diagnostics Output:</h3>
    <pre id="output">System sitting idle. Awaiting exam document uploads...</pre>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const out = document.getElementById('output');
            out.textContent = "Processing target asset document page by page via Local VLM architecture...";
            
            const formData = new FormData();
            formData.append('file', document.getElementById('fileInput').files[0]);
            formData.append('ocr_hint', document.getElementById('hintInput').value);

            try {
                const res = await fetch('http://127.0.0.1:8000/classify', { method: 'POST', body: formData });
                const data = await res.json();
                out.textContent = JSON.stringify(data, null, 2);
            } catch (err) {
                out.textContent = "System Runtime Error: " + err.message;
            }
        });
    </script>
</body>
</html>
